<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Підключення стилів -->
    <link rel="stylesheet" href="style.css" />

    <title>Document</title>
  </head>
  <body>
    <!-- Підключення FontAwesome для використання текстових іконок -->
    <script
      src="https://use.fontawesome.com/releases/v5.15.4/js/all.js"
      integrity="sha384-rOA1PnstxnOBLzCLMcre8ybwbTmemjzdNlILg8O7z1lUkLXozs4DHonlDtnE7fpc"
      crossorigin="anonymous"
    ></script>

    <!-- Підключення локального скрипта -->
    <main class="container">
      <h1 class="weather-title">Погода</h1>
      <div class="weather-row">
        <form id="weather-form" class="weather-form">
          <input id="city-input" type="text" placeholder="Введи місто (наприклад Kyiv)" required />
          <button class="weather-button" type="submit">Показати погоду</button>
        </form>
      </div>
      <div class="weather-date">
        <input id="date-input" type="date" disabled />
        <button id="date-button" class="weather-button" type="button" disabled>Показати за дату</button>
      </div>
      <div class="weather-output-panel">
        <video class="weather-bg-video" autoplay loop muted playsinline src="images/bg_gif.mp4"></video>
        <div id="weather-output" class="weather-output"></div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
